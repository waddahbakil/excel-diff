<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>جرد الأصناف - كامل</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body {
            margin: 0; padding: 8px; background: #f5f5f5; font-size: 13px;
        }
        h1 { font-size: 18px; margin: 0 0 12px 0; color: #1a1a1a; text-align: center; }
    .card {
            background: white; border-radius: 10px; padding: 12px;
            margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        button {
            width: 100%; padding: 10px; border-radius: 8px; border: none;
            background: #0066ff; color: white; font-weight: 600;
            font-size: 14px; margin: 6px 0; cursor: pointer;
        }
        button.danger { background: #d32f2f; }
        button.success { background: #2e7d32; }
        button:active { opacity: 0.8; }
        input[type="file"], input[type="text"] {
            width: 100%; padding: 8px; border-radius: 8px;
            border: 1px solid #ddd; font-size: 13px; margin: 6px 0;
        }
        label { display: block; font-weight: 600; margin-top: 8px; color: #333; font-size: 13px; }
        select {
            width: 100%; padding: 8px; border-radius: 8px;
            border: 1px solid #ddd; font-size: 13px; margin: 4px 0 8px 0;
        }
    .table-wrapper { overflow-x: auto; margin-top: 8px; }
        table {
            width: 100%; border-collapse: collapse; font-size: 12px;
            table-layout: fixed;
        }
        th, td {
            border: 1px solid #e0e0e0; padding: 6px 2px; text-align: center;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            position: relative;
        }
        th {
            background: #f8f8f8; font-weight: 600; position: sticky; top: 0;
            font-size: 11px; z-index: 1;
        }
        th:nth-child(1), td:nth-child(1) { width: 13%; }
        th:nth-child(2), td:nth-child(2) { width: 22%; }
        th:nth-child(3), td:nth-child(3) { width: 16%; }
        th:nth-child(4), td:nth-child(4) { width: 16%; }
        th:nth-child(5), td:nth-child(5) { width: 22%; }
        th:nth-child(6), td:nth-child(6) { width: 11%; }

        td input {
            width: 100%; border: none; background: transparent;
            text-align: center; padding: 2px; font-size: 12px;
        }
        td input:focus { outline: 2px solid #0066ff; background: #f0f7ff; }
    .diff-col { background: #fff8e1; font-weight: 600; }
    .diff-negative { color: #d32f2f; }
    .diff-positive { color: #2e7d32; }
    .diff-zero { color: #666; }
    .hidden { display: none; }
    .row-count { font-size: 11px; color: #666; margin-top: 6px; text-align: center; }
    .tip { font-size: 11px; color: #27ae60; text-align: center; margin-top: 4px; font-weight: 600; }
    .btn-row { display: flex; gap: 8px; }
    .btn-row button { flex: 1; }
    .delete-btn {
            background: #ff4444; color: white; border: none;
            padding: 4px 6px; border-radius: 4px; font-size: 10px;
            cursor: pointer; width: auto;
        }
    .search-box {
            display: flex; gap: 8px; align-items: center; margin-bottom: 8px;
        }
    .search-box input { flex: 1; margin: 0; }
    .search-box button { width: auto; padding: 8px 12px; margin: 0; }
    .total-box {
            background: #e3f2fd; padding: 10px; border-radius: 8px;
            margin-top: 12px; text-align: center; font-weight: 600;
        }
    .total-positive { color: #2e7d32; }
    .total-negative { color: #d32f2f; }
     tr.hidden-row { display: none; }
    </style>
</head>
<body>
    <h1>جرد الأصناف - نسخة كاملة</h1>

    <div class="card">
        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
        <div class="btn-row">
            <button onclick="exportExcel()">حفظ إكسل</button>
            <button class="success" onclick="addNewRow()">+ صنف جديد</button>
        </div>
        <div class="btn-row">
            <button class="danger" onclick="clearData()">مسح الكل</button>
        </div>
        <div class="row-count" id="rowCount"></div>
        <div class="tip">✓ يتم الحفظ تلقائياً</div>
    </div>

    <div class="card hidden" id="controlsCard">
        <label>عمود الكمية:</label>
        <select id="colQty"></select>

        <label>عمود الجرد:</label>
        <select id="colStock"></select>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="ابحث برقم أو اسم الصنف..." oninput="searchItems()">
            <button onclick="clearSearch()">مسح</button>
        </div>
    </div>

    <div class="card">
        <div class="table-wrapper">
            <table id="dataTable"></table>
        </div>
        <div class="total-box" id="totalBox">إجمالي الفارق: 0</div>
    </div>

<script>
let workbookData = [];
let headers = [];

document.getElementById('fileInput').addEventListener('change', handleFile);
document.getElementById('colQty').addEventListener('change', () => { updateDiff(); saveData(); });
document.getElementById('colStock').addEventListener('change', () => { updateDiff(); saveData(); });

window.onload = function() {
    loadData();
};

function saveData() {
    const dataToSave = {
        headers: headers,
        workbookData: workbookData,
        colQty: document.getElementById('colQty').value,
        colStock: document.getElementById('colStock').value
    };
    localStorage.setItem('jardData', JSON.stringify(dataToSave));
}

function loadData() {
    const saved = localStorage.getItem('jardData');
    if (saved) {
        const data = JSON.parse(saved);
        headers = data.headers || [];
        workbookData = data.workbookData || [];

        if (workbookData.length > 0) {
            renderTable();
            setupColumnSelectors();
            document.getElementById('colQty').value = data.colQty || 0;
            document.getElementById('colStock').value = data.colStock || 1;
            document.getElementById('controlsCard').classList.remove('hidden');
            updateDiff();
        }
    }
}

function clearData() {
    if (confirm('متأكد تبي تمسح كل البيانات؟ ما تقدر ترجعها')) {
        localStorage.removeItem('jardData');
        workbookData = [];
        headers = [];
        document.getElementById('dataTable').innerHTML = '';
        document.getElementById('controlsCard').classList.add('hidden');
        document.getElementById('rowCount').textContent = '';
        document.getElementById('fileInput').value = '';
        document.getElementById('totalBox').textContent = 'إجمالي الفارق: 0';
    }
}

function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type: 'array'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        workbookData = XLSX.utils.sheet_to_json(sheet, {header: 1});

        if (workbookData.length === 0) return;

        headers = workbookData[0].map((h, i) => h || `عمود ${i+1}`);
        renderTable();
        setupColumnSelectors();
        autoSelectColumns();
        document.getElementById('controlsCard').classList.remove('hidden');
        saveData();
    };
    reader.readAsArrayBuffer(file);
}

function autoSelectColumns() {
    const qtyIdx = headers.findIndex(h => h.includes('الكمية'));
    const stockIdx = headers.findIndex(h => h.includes('الجرد'));

    if (qtyIdx!== -1) document.getElementById('colQty').value = qtyIdx;
    if (stockIdx!== -1) document.getElementById('colStock').value = stockIdx;

    updateDiff();
}

function addNewRow() {
    if (headers.length === 0) {
        alert('ارفع ملف أولاً أو أنشئ الأعمدة');
        return;
    }

    const newRow = new Array(headers.length).fill('');
    workbookData.push(newRow);
    renderTable();
    saveData();

    // اسحب للأسفل عشان تشوف الصف الجديد
    setTimeout(() => {
        window.scrollTo(0, document.body.scrollHeight);
    }, 100);
}

function deleteRow(index) {
    if (confirm('متأكد تبي تحذف هذا الصنف؟')) {
        workbookData.splice(index + 1, 1); // +1 لأن الصف 0 هو العناوين
        renderTable();
        saveData();
    }
}

function searchItems() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const rows = document.querySelectorAll('#dataTable tbody tr');

    rows.forEach(row => {
        const text = row.textContent.toLowerCase();
        if (text.includes(query)) {
            row.classList.remove('hidden-row');
        } else {
            row.classList.add('hidden-row');
        }
    });
}

function clearSearch() {
    document.getElementById('searchInput').value = '';
    searchItems();
}

function renderTable() {
    const table = document.getElementById('dataTable');
    table.innerHTML = '';

    const thead = document.createElement('thead');
    const headerRow = document.createElement('tr');
    headers.forEach(h => {
        const th = document.createElement('th');
        th.textContent = h;
        headerRow.appendChild(th);
    });
    const thDiff = document.createElement('th');
    thDiff.textContent = 'الفارق';
    thDiff.className = 'diff-col';
    headerRow.appendChild(thDiff);

    const thAction = document.createElement('th');
    thAction.textContent = 'حذف';
    headerRow.appendChild(thAction);

    thead.appendChild(headerRow);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    for (let i = 1; i < workbookData.length; i++) {
        const row = document.createElement('tr');
        row.dataset.index = i - 1;

        headers.forEach((h, colIdx) => {
            const td = document.createElement('td');
            const input = document.createElement('input');
            input.type = 'text';
            input.value = workbookData[i][colIdx] || '';
            input.oninput = (e) => {
                workbookData[i][colIdx] = e.target.value;
                updateDiff();
                saveData();
            };
            td.appendChild(input);
            row.appendChild(td);
        });

        const tdDiff = document.createElement('td');
        tdDiff.className = 'diff-col';
        tdDiff.id = `diff-${i}`;
        tdDiff.textContent = '-';
        row.appendChild(tdDiff);

        const tdAction = document.createElement('td');
        const delBtn = document.createElement('button');
        delBtn.textContent = '✕';
        delBtn.className = 'delete-btn';
        delBtn.onclick = () => deleteRow(i - 1);
        tdAction.appendChild(delBtn);
        row.appendChild(tdAction);

        tbody.appendChild(row);
    }
    table.appendChild(tbody);

    document.getElementById('rowCount').textContent = `عدد الأصناف: ${workbookData.length - 1}`;
    updateDiff();
}

function setupColumnSelectors() {
    const colQty = document.getElementById('colQty');
    const colStock = document.getElementById('colStock');
    colQty.innerHTML = '';
    colStock.innerHTML = '';

    headers.forEach((h, i) => {
        colQty.add(new Option(h, i));
        colStock.add(new Option(h, i));
    });
}

function updateDiff() {
    const qtyIdx = parseInt(document.getElementById('colQty').value);
    const stockIdx = parseInt(document.getElementById('colStock').value);
    let totalDiff = 0;

    for (let i = 1; i < workbookData.length; i++) {
        const valQty = parseFloat(workbookData[i][qtyIdx]) || 0;
        const valStock = parseFloat(workbookData[i][stockIdx]) || 0;
        const diff = valQty - valStock;
        totalDiff += diff;

        const diffCell = document.getElementById(`diff-${i}`);

        if (diffCell) {
            diffCell.textContent = diff.toFixed(2);
            diffCell.className = 'diff-col ';
            if (diff < 0) diffCell.className += 'diff-negative';
            else if (diff > 0) diffCell.className += 'diff-positive';
            else diffCell.className += 'diff-zero';
        }
    }

    const totalBox = document.getElementById('totalBox');
    totalBox.textContent = `إجمالي الفارق: ${totalDiff.toFixed(2)}`;
    totalBox.className = 'total-box ' + (totalDiff < 0? 'total-negative' : totalDiff > 0? 'total-positive' : '');
}

function exportExcel() {
    if (workbookData.length === 0) {
        alert('ارفع ملف أولاً');
        return;
    }

    const exportData = [ [...headers, 'الفارق'] ];
    const qtyIdx = parseInt(document.getElementById('colQty').value);
    const stockIdx = parseInt(document.getElementById('colStock').value);

    for (let i = 1; i < workbookData.length; i++) {
        const row = [...workbookData[i]];
        const valQty = parseFloat(row[qtyIdx]) || 0;
        const valStock = parseFloat(row[stockIdx]) || 0;
        row.push((valQty - valStock).toFixed(2));
        exportData.push(row);
    }

    const ws = XLSX.utils.aoa_to_sheet(exportData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'نتيجة الجرد');
    XLSX.writeFile(wb, 'نتيجة_الجرد.xlsx');
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>جرد الأصناف - مطور</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { margin: 0; padding: 8px; background: #f5f5f5; font-size: 13px; }
        h1 { font-size: 18px; margin: 0 0 12px 0; color: #1a1a1a; text-align: center; }
        .card { background: white; border-radius: 10px; padding: 12px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        button { width: 100%; padding: 10px; border-radius: 8px; border: none; background: #0066ff; color: white; font-weight: 600; font-size: 14px; margin: 6px 0; cursor: pointer; }
        button.danger { background: #d32f2f; }
        button.success { background: #2e7d32; }
        input[type="file"], input[type="text"] { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; font-size: 13px; margin: 6px 0; }
        label { display: block; font-weight: 600; margin-top: 8px; color: #333; font-size: 13px; }
        select { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; font-size: 13px; margin: 4px 0 8px 0; }
        
        /* تعديلات الجدول لتحسين المساحات */
        .table-wrapper { overflow-x: auto; margin-top: 8px; border-radius: 8px; border: 1px solid #e0e0e0; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; background: white; table-layout: auto; }
        th, td { border: 1px solid #e0e0e0; padding: 8px 4px; text-align: center; }
        th { background: #f8f8f8; font-weight: 700; position: sticky; top: 0; z-index: 1; }

        /* التحكم في عرض الأعمدة */
        /* عمود اسم الصنف (العمود الأول) */
        th:nth-child(1), td:nth-child(1) { width: 45%; min-width: 120px; text-align: right; padding-right: 8px; }
        /* بقية الأعمدة (الكميات والفارق والحذف) */
        th:not(:nth-child(1)), td:not(:nth-child(1)) { width: 11%; white-space: nowrap; }

        td input { width: 100%; border: none; background: transparent; text-align: center; padding: 4px; font-size: 13px; color: #333; }
        td input:focus { outline: none; background: #f0f7ff; border-radius: 4px; }
        
        /* تمييز عمود اسم الصنف */
        td:nth-child(1) input { text-align: right; font-weight: 500; }

        .diff-col { background: #fffde7; font-weight: bold; }
        .diff-negative { color: #d32f2f; }
        .diff-positive { color: #2e7d32; }
        .delete-btn { background: #ff4444; color: white; border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 12px; }
        
        .search-box { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
        .search-box input { flex: 1; margin: 0; }
        .search-box button { width: auto; padding: 8px 12px; margin: 0; }
        .total-box { background: #e3f2fd; padding: 12px; border-radius: 8px; margin-top: 12px; text-align: center; font-weight: 700; font-size: 15px; }
        tr.hidden-row { display: none; }
        .tip { font-size: 11px; color: #27ae60; text-align: center; margin-top: 4px; font-weight: 600; }
    </style>
</head>
<body>

    <h1>نظام جرد الأصناف</h1>

    <div class="card">
        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
        <div style="display: flex; gap: 8px;">
            <button onclick="exportExcel()">تصدير إكسل</button>
            <button class="success" onclick="addNewRow()">+ إضافة صنف</button>
        </div>
        <button class="danger" onclick="clearData()">مسح كافة البيانات</button>
        <div id="rowCount" style="text-align: center; color: #666; margin-top: 5px;"></div>
        <div class="tip">✓ يتم الحفظ تلقائياً على المتصفح</div>
    </div>

    <div class="card hidden" id="controlsCard" style="display:none;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
                <label>عمود الكمية:</label>
                <select id="colQty"></select>
            </div>
            <div>
                <label>عمود الجرد:</label>
                <select id="colStock"></select>
            </div>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="ابحث عن صنف..." oninput="searchItems()">
            <button onclick="clearSearch()">مسح</button>
        </div>
    </div>

    <div class="card">
        <div class="table-wrapper">
            <table id="dataTable"></table>
        </div>
        <div class="total-box" id="totalBox">إجمالي الفارق: 0</div>
    </div>

<script>
let workbookData = [];
let headers = [];

document.getElementById('fileInput').addEventListener('change', handleFile);
document.getElementById('colQty').addEventListener('change', () => { updateDiff(); saveData(); });
document.getElementById('colStock').addEventListener('change', () => { updateDiff(); saveData(); });

window.onload = loadData;

function normalizeArabic(text) {
    if (!text) return '';
    return text.toString().toLowerCase()
     .replace(/أ|إ|آ/g, 'ا').replace(/ة/g, 'ه').replace(/ى/g, 'ي')
     .replace(/ئ|ؤ/g, 'ي').replace(/[ًٌٍَُِّْ]/g, '').trim();
}

function saveData() {
    const dataToSave = {
        headers,
        workbookData,
        colQty: document.getElementById('colQty').value,
        colStock: document.getElementById('colStock').value
    };
    localStorage.setItem('jardData_v2', JSON.stringify(dataToSave));
}

function loadData() {
    const saved = localStorage.getItem('jardData_v2');
    if (saved) {
        const data = JSON.parse(saved);
        headers = data.headers || [];
        workbookData = data.workbookData || [];
        if (workbookData.length > 0) {
            renderTable();
            setupColumnSelectors();
            document.getElementById('colQty').value = data.colQty;
            document.getElementById('colStock').value = data.colStock;
            document.getElementById('controlsCard').style.display = 'block';
            updateDiff();
        }
    }
}

function handleFile(e) {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type: 'array'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        workbookData = XLSX.utils.sheet_to_json(sheet, {header: 1});
        if (workbookData.length > 0) {
            headers = workbookData[0].map((h, i) => h || `عمود ${i+1}`);
            renderTable();
            setupColumnSelectors();
            autoSelectColumns();
            document.getElementById('controlsCard').style.display = 'block';
            saveData();
        }
    };
    reader.readAsArrayBuffer(file);
}

function autoSelectColumns() {
    headers.forEach((h, i) => {
        const name = normalizeArabic(h);
        if (name.includes('كميه')) document.getElementById('colQty').value = i;
        if (name.includes('جرد')) document.getElementById('colStock').value = i;
    });
    updateDiff();
}

function renderTable() {
    const table = document.getElementById('dataTable');
    table.innerHTML = '';
    
    const thead = document.createElement('thead');
    const hRow = document.createElement('tr');
    headers.forEach(h => { const th = document.createElement('th'); th.textContent = h; hRow.appendChild(th); });
    
    const thDiff = document.createElement('th'); thDiff.textContent = 'الفارق'; thDiff.className = 'diff-col'; hRow.appendChild(thDiff);
    const thDel = document.createElement('th'); thDel.textContent = 'حذف'; hRow.appendChild(thDel);
    
    thead.appendChild(hRow);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    for (let i = 1; i < workbookData.length; i++) {
        const row = document.createElement('tr');
        row.dataset.index = i;

        headers.forEach((h, colIdx) => {
            const td = document.createElement('td');
            const input = document.createElement('input');
            input.value = workbookData[i][colIdx] || '';
            input.oninput = (e) => { workbookData[i][colIdx] = e.target.value; updateDiff(); saveData(); };
            td.appendChild(input);
            row.appendChild(td);
        });

        const tdDiff = document.createElement('td');
        tdDiff.className = 'diff-col';
        tdDiff.id = `diff-${i}`;
        row.appendChild(tdDiff);

        const tdDel = document.createElement('td');
        tdDel.innerHTML = `<button class="delete-btn" onclick="deleteRow(${i})">✕</button>`;
        row.appendChild(tdDel);
        tbody.appendChild(row);
    }
    table.appendChild(tbody);
    document.getElementById('rowCount').textContent = `عدد الأصناف: ${workbookData.length - 1}`;
    updateDiff();
}

function updateDiff() {
    const qIdx = parseInt(document.getElementById('colQty').value);
    const sIdx = parseInt(document.getElementById('colStock').value);
    let total = 0;

    for (let i = 1; i < workbookData.length; i++) {
        const q = parseFloat(workbookData[i][qIdx]) || 0;
        const s = parseFloat(workbookData[i][sIdx]) || 0;
        const diff = q - s;
        total += diff;
        const cell = document.getElementById(`diff-${i}`);
        if (cell) {
            cell.textContent = diff.toFixed(2);
            cell.className = 'diff-col ' + (diff < 0 ? 'diff-negative' : diff > 0 ? 'diff-positive' : '');
        }
    }
    document.getElementById('totalBox').textContent = `إجمالي الفارق: ${total.toFixed(2)}`;
}

function setupColumnSelectors() {
    const q = document.getElementById('colQty'), s = document.getElementById('colStock');
    q.innerHTML = ''; s.innerHTML = '';
    headers.forEach((h, i) => {
        q.add(new Option(h, i));
        s.add(new Option(h, i));
    });
}

function addNewRow() {
    if (headers.length === 0) headers = ['اسم الصنف', 'الكمية', 'الجرد'];
    const newRow = new Array(headers.length).fill('');
    workbookData.push(newRow);
    renderTable();
    saveData();
}

function deleteRow(idx) {
    if (confirm('حذف هذا الصنف؟')) {
        workbookData.splice(idx, 1);
        renderTable();
        saveData();
    }
}

function searchItems() {
    const q = normalizeArabic(document.getElementById('searchInput').value);
    const rows = document.querySelectorAll('#dataTable tbody tr');
    rows.forEach(row => {
        const text = normalizeArabic(row.innerText);
        row.style.display = text.includes(q) ? '' : 'none';
    });
}

function clearSearch() { document.getElementById('searchInput').value = ''; searchItems(); }

function clearData() {
    if (confirm('سيتم مسح كل البيانات، هل أنت متأكد؟')) {
        localStorage.removeItem('jardData_v2');
        location.reload();
    }
}

function exportExcel() {
    const finalData = [ [...headers, 'الفارق'] ];
    const qIdx = parseInt(document.getElementById('colQty').value);
    const sIdx = parseInt(document.getElementById('colStock').value);
    for (let i = 1; i < workbookData.length; i++) {
        const q = parseFloat(workbookData[i][qIdx]) || 0;
        const s = parseFloat(workbookData[i][sIdx]) || 0;
        finalData.push([...workbookData[i], (q - s).toFixed(2)]);
    }
    const ws = XLSX.utils.aoa_to_sheet(finalData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "الجرد");
    XLSX.writeFile(wb, "تقرير_الجرد.xlsx");
}
</script>
</body>
</html>
